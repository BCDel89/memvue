services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7700:7700"
    env_file:
      - .env
    volumes:
      # Mount every path listed in FS_ROOTS (read-only).
      # Example — if FS_ROOTS=/Users/me/.claude,/Users/me/notes:
      #   - /Users/me/.claude:/Users/me/.claude:ro
      #   - /Users/me/notes:/Users/me/notes:ro
      - ${FS_ROOTS:-./data}:${FS_ROOTS:-./data}:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
