services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7700:7700"
    env_file:
      - .env
    volumes:
      - ${FS_ROOTS:-./data}:${FS_ROOTS:-./data}:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
